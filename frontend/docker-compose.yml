version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrust_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - fintrust_network

  backend:
    image: fintrust_backend:latest
    container_name: fintrust_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://fintrust:fintrust_secure_password@postgres:5432/fintrust_db}
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - fintrust_network

networks:
  fintrust_network:
    driver: bridge
