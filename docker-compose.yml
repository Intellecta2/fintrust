version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fintrust_postgres
    environment:
      POSTGRES_USER: fintrust
      POSTGRES_PASSWORD: fintrust_secure_password
      POSTGRES_DB: fintrust_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrust"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrust_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrust_backend
    environment:
      DATABASE_URL: postgresql://fintrust:fintrust_secure_password@postgres:5432/fintrust_db
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: 'True'
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:3001", "http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - fintrust_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintrust_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - fintrust_network
    command: npm run dev

  # PgAdmin for Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintrust_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintrust.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fintrust_network
    profiles:
      - debug

volumes:
  postgres_data:

networks:
  fintrust_network:
    driver: bridge
